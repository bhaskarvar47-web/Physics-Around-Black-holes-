<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravitational Lensing Simulator</title>
    <style>
        body {      
                margin: 0;
                overflow: hidden;
                background-color: black;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                padding: 0;
                color: var(--text-main);
                display: flex;
                height: 100vh;
        }

        :root {
            --bg-color: #0a0b0f;
            --panel-bg: #1f2833;
            --text-main: #c5c6c7;
            --accent: #66fcf1;
            --accent-dark: #45a29e;
        }

        #control-panel {
            background-color: var(--panel-bg);
            width: 320px;
            padding: 20px;
            display: flex;
            direction: column;
            box-shadow: 0 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        h1 {
            color: var(--accent);
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: solid var(--accent-dark);
            padding-bottom: 10px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type='range'] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .value-display {
            float: right;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .info-box {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-top: auto;
            border-left: 3px solid var(--accent-dark);
        }

        #simulator-container {
            flex-grow: 1;
            position: relative;
            background-color: #000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .crosshair::before.crosshair::after {
            content: '';
            background-color: rgba(255, 255, 255, 0.2);
            position: absolute;
        }

        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
        }

        .crosshair::after {
            left: 50%;
            top: 0;
            height: 100%;
            width: 1px;
        }
    </style>
</head>
<body>
    <div id="control-panel">
        <h2 style="margin-top: 0;">Black Hole Simulator</h2>
        <label for="massSlider">Mass (Solar Masses): <span id="massValue">10</span></label>
        <input type="range" id="massSlider" min="1" max="200" value="10">
        <p style="font-size: 12px; color: #ccc">Drag canvas to rotate camera. <br>
            Observe the background distortion
        </p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15

        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        

        const loader = new THREE.TextureLoader();

        const canvas = document.createElement('canvas')
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d')
        ctx.fillStyle = '#a0a1a'; ctx.fillRect(0, 0, 512, 512);
        ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2;
        for(let i=0; i<512; i+=32) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(512, i); ctx.stroke();
        }


        for(let i=0; i<200; i++) {
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); 
            ctx.arc(Math.random()*512, Math.random()*512, Math.random()*3, 0, Math.PI*2); ctx.fill();
        }

        const bgTexture = new THREE.CanvasTexture(canvas);
        scene.background = bgTexture;


        const eventHorizonGeometry = new THREE.SphereGeometry(2, 64,  64);
        const eventHorizonMaterial = new THREE.MeshBasicMaterial({color: 0x000000 });
        const blackHole = new THREE.Mesh(eventHorizonGeometry, eventHorizonMaterial);
        scene.add(blackHole);


        const cubeRenderTarget = new THREE.WebGLCubeRenderTarger(512);
        const cubeCamera = new THREE.cubeCamera(0.1, 1000, cubeRenderTarget);
        scene.add(cubeCamera);

        const lensingShader = {
            uniforms: {
                "tCube": { value: cubeRenderTarget.texture },
                "refractionRatio": { value: 0.98 },
                "lensingStrength": { value: 1.5 }
            },
            vertexShader: `
            varying vec3 vRefract;
            uniform float refractionRatio;
            void main() {
                vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                vec3 worldNormal = normalize(mat 3(modelMatrix[0].xyz, modelMatrix[1].xyz, modelMatrix[2].xyz) * normal);
                vec3 cameraToVertex = normalize(worldPosition.xyz - cameraPosition);
                //Calculate the refraction vector
                vRefract = refract(cameraTcVertex, worldNormal, refractionRatio);
                gl_Position = projectionMatrix * viewMatrix * worldPosition;
            }
            
            `,
            fragmentShader:`
            uniform samplerCube tCube;
            uniform float lensingStrength;
            varying vec3 vRefract;
            void main() {
                // Warp the refraction vector based on strength
                vec3 warpedRefract = normalize(vRefract) *  lensingStrength;
                gl_FragColor = textureCube(tCube, vec3(-warpedRefract.x, warpedRefract.y, warpedRefract.z));
            }
            `
        };

        const lensingMaterial = new THREE.ShaderMaterial({
            uniforms: lensingShader.unifroms,
            vertexShader: lensingShader.vertexShader,
            fragmentShader: lensingShader.fragmentShader,
            transparent: true,
            opacity: 0.8
        });



        const lensingGeometry = new THREE.SphereGeometry(4.5, 64, 64);
        const lensingBubble = new THREE.Mesh(lensingGeometry, lensingMaterial);
        scene.add(lensingBubble)

        const massSlider = document.getElementById('massSlider');
        const massValue = document.getElementById('massValue');

        massSlider.addEventListener('input', async (e) => {
            const mass= e.target.value;
            massValue.innerText = mass;
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/blackhole/${mass}`)
                const data = await response.json();

                blackHole.scale.set(data.event_horizon_radius, data.event_horizon_radius, data.event_horizon_radius);
                lensingBubble.scale.set(data.photon_sphere_radius, data.photon_sphere_radius, data.photon_sphere_radius);
                lensingMaterial.uniforms.lensingStrength.value = data.lensing_strength;
            } catch (err) {
                console.log("Backend not running, using frontend approximations.");

                const scale = 1 + (mass*0.05);
                blackHole.scale.set(scale, scale,scale);
                lensingBubble.scale.set(scale * 2.2, scale * 2.2, scale * 2.2);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            lensingBubble.visible = false;
            cubeCamera.position.copy(blackHole.position);
            cubeCamera.update(renderer, scene);
            lensingBubble.visible = true;

            renderer.render(scene, camera);
         }
         animate();
    </script>
</body>
</html>
